name: CI
on:
  push:
    branches: [main, openclaw/*]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - working-directory: apps/aquarium_app
        run: flutter analyze --no-pub

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - working-directory: apps/aquarium_app
        run: flutter test test/

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Expose Android command-line tools
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - working-directory: apps/aquarium_app
        run: flutter build apk --debug --target-platform android-arm64

  release-appbundle:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Expose Android command-line tools
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - name: Create CI release signing key
        working-directory: apps/aquarium_app/android
        run: |
          keytool -genkeypair \
            -v \
            -keystore app/ci-release.jks \
            -storepass android \
            -keypass android \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Danio CI, OU=CI, O=Danio, L=London, ST=London, C=GB"
          cat > key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=ci
          storeFile=ci-release.jks
          EOF
      - working-directory: apps/aquarium_app
        run: flutter build appbundle --release
