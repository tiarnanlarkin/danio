name: CI
on:
  push:
    branches: [main, openclaw/*]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - working-directory: apps/aquarium_app
        run: flutter analyze --no-pub

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - working-directory: apps/aquarium_app
        run: flutter test test/

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      - working-directory: apps/aquarium_app
        run: flutter pub get
      - working-directory: apps/aquarium_app
        run: flutter build apk --debug --target-platform android-arm64
