appId: com.tiarnanlarkin.danio
---
# Current Tank management surface smoke.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd
- assertVisible: "Tank Toolbox"

- tapOn:
    point: "38%,84%"
- waitForAnimationToEnd
- assertVisible: "Tank Toolbox"

- tapOn:
    point: "62%,84%"
- waitForAnimationToEnd
- assertVisible: "Tank Toolbox"
