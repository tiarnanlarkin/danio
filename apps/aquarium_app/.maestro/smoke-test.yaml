appId: com.tiarnanlarkin.danio
---
# Current black-box smoke test.

# 1. Fresh launch and privacy consent.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn:
    point: "50%,88%"
- waitForAnimationToEnd

# 2. Current first-run entry.
- tapOn:
    point: "50%,91%"
- waitForAnimationToEnd

# We should now be on the Learn tab.
- assertVisible: "Learning Paths"

# Dismiss the first-run tooltip if present.
- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

# 3. Tab navigation.
- tapOn:
    point: "30%,92%"
- waitForAnimationToEnd

- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd

- tapOn:
    point: "70%,92%"
- waitForAnimationToEnd

- tapOn:
    point: "90%,92%"
- waitForAnimationToEnd

- tapOn:
    point: "10%,92%"
- waitForAnimationToEnd

# 4. Open the first learning path and return.
- tapOn:
    point: "50%,18%"
- waitForAnimationToEnd
- assertVisible: "Learning Paths"
- back
- waitForAnimationToEnd

# 5. Finish on Tank tab.
- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd
