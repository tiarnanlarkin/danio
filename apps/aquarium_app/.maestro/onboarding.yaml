appId: com.tiarnanlarkin.danio
---
# Current first-run quick-entry smoke.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn:
    point: "50%,88%"
- waitForAnimationToEnd

- tapOn:
    point: "50%,91%"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- assertVisible: "Learning Paths"
- assertVisible: "12 paths to explore"
