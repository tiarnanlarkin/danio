appId: com.tiarnanlarkin.danio
---
# Current More/settings inventory smoke.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- tapOn:
    point: "90%,92%"
- waitForAnimationToEnd

- assertVisible: "More"
- assertVisible: ".*Achievements.*"
- assertVisible: ".*Workshop.*"
- assertVisible: ".*Analytics.*"
- assertVisible: ".*Preferences.*"
- assertVisible: ".*Backup.*"
