appId: com.tiarnanlarkin.danio
---
# Current resilience smoke: rapid tab switching and root back handling.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- tapOn:
    point: "10%,92%"
- tapOn:
    point: "30%,92%"
- tapOn:
    point: "50%,92%"
- tapOn:
    point: "70%,92%"
- tapOn:
    point: "90%,92%"
- tapOn:
    point: "10%,92%"
- waitForAnimationToEnd
- assertVisible: "Learning Paths"

- back
- waitForAnimationToEnd
- assertVisible: "Learning Paths"
