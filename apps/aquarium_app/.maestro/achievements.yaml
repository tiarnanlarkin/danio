appId: com.tiarnanlarkin.danio
---
# Current Achievements entry smoke.
# The deeper route-open check is covered by scripts/run_android_blackbox_smoke.ps1.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- tapOn:
    point: "90%,92%"
- waitForAnimationToEnd

- assertVisible: "More"
- assertVisible: ".*Achievements.*"
