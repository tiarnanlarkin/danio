appId: com.tiarnanlarkin.danio
---
# Current Workshop inventory smoke.
# Maestro can reliably verify the visible Workshop surface. Deeper route
# activation is covered by scripts/run_android_blackbox_smoke.ps1 because raw
# Android taps activate the Flutter cards more reliably than Maestro here.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- tapOn:
    point: "90%,92%"
- waitForAnimationToEnd
- assertVisible: "More"

- tapOn: ".*Workshop.*"
- waitForAnimationToEnd
- assertVisible: ".*Workshop.*"
- assertVisible: "Tools & calculators"
- assertVisible: ".*Water Change.*"
- assertVisible: ".*Stocking.*"
- assertVisible: ".*Calculator.*"
- assertVisible: ".*Dosing.*"
- assertVisible: ".*Unit Converter.*"
- assertVisible: ".*Tank Volume.*"
- assertVisible: ".*Lighting.*"
- assertVisible: ".*Compatibility.*"
