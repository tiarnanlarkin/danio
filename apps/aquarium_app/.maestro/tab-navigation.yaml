appId: com.tiarnanlarkin.danio
---
# Current shell navigation flow.
# Starts from a clean install, accepts privacy choices, skips setup, then
# verifies each bottom tab exposes the expected current content.

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Consent gate. The checkbox semantics are not currently exposed to Maestro,
# so these taps use stable relative positions in the consent sheet.
- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

# Enter the current main-shell quick path.
- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

# Learn
- assertVisible: "Learning Paths"
- assertVisible: "12 paths to explore"

# Practice
- tapOn:
    point: "30%,92%"
- waitForAnimationToEnd
- assertVisible: "Practice Modes"

# Tank
- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd
- assertVisible: "Tank Toolbox"

# Smart
- tapOn:
    point: "70%,92%"
- waitForAnimationToEnd
- assertVisible: ".*Smart.*"

# More
- tapOn:
    point: "90%,92%"
- waitForAnimationToEnd
- assertVisible: "More"
- assertVisible: ".*Workshop.*"

# Return to Learn.
- tapOn:
    point: "10%,92%"
- waitForAnimationToEnd
- assertVisible: "Learning Paths"
