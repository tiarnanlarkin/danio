appId: com.tiarnanlarkin.danio
---
# Current Learn surface smoke.
# Full lesson completion and lesson hint expansion are better covered by a
# seeded integration/debug-deep-link flow because Maestro cannot reliably
# activate every Flutter lesson card in this build.

- launchApp:
    clearState: true
- waitForAnimationToEnd

- assertVisible: "Your Privacy Matters"
- tapOn:
    point: "11%,49%"
- tapOn:
    point: "11%,59%"
- tapOn: "No Thanks"
- waitForAnimationToEnd

- tapOn: "Skip setup, explore first|Skip setup, I'll explore first"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Close tooltip"
    commands:
      - tapOn: "Close tooltip"
      - waitForAnimationToEnd

- assertVisible: "Learning Paths"
- assertVisible: "12 paths to explore"
- assertVisible: ".*Interactive Stories.*"
