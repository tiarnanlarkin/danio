name: aquarium_app
description: "Personal aquarium management — track tanks, livestock, equipment & maintenance."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Local storage (add when needed)
  # hive_flutter: ^1.1.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  synchronized: ^3.3.0+3
  connectivity_plus: ^6.1.2
  
  # Charts
  fl_chart: ^0.69.2
  
  # Animations
  flutter_animate: ^4.5.0
  rive: ^0.13.0
  confetti: ^0.7.0
  skeletonizer: ^2.1.2
  floating_bubbles: ^2.6.2
  animations: ^2.0.11
  lottie: ^3.0.0
  
  # File handling
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path: ^1.9.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  archive: ^3.6.1
  
  # Performance - Optimized image loading
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/rive/
