name: danio
description: "Danio — learn aquarium keeping through bite-sized lessons, spaced repetition, and smart tank management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  
  # Local storage
  
  # HTTP
  http: ^1.2.2
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  synchronized: ^3.3.0+3
  connectivity_plus: ^6.1.2
  
  # Charts
  fl_chart: ^0.69.2
  
  # Typography
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0
  rive: ^0.13.0
  confetti: ^0.7.0
  skeletonizer: ^2.1.2

  # Audio & Haptics
  
  # File handling
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path: ^1.9.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  flutter_local_notifications: ^18.0.1
  in_app_review: ^2.0.9
  timezone: ^0.10.0
  archive: ^3.6.1
  
  # Performance - Optimized image loading
  cached_network_image: ^3.4.1
  
  # Cloud — Supabase backend
  supabase_flutter: ^2.8.4
  
  # Encryption for backup
  encrypt: ^5.0.3
  crypto: ^3.0.6
  
  # Firebase (configuration pending - see android/app/FIREBASE_SETUP.md)
  firebase_core: ^2.24.2
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  patrol: ^4.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/rive/
    - assets/images/onboarding/
    - assets/images/illustrations/
    - assets/images/fish/
    - assets/images/fish/thumb/
    - assets/images/placeholder.webp
    - assets/icons/app_icon.png
    - assets/icons/badges/
    - assets/textures/
    - assets/backgrounds/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        # R-089: Map w300 (Light) to Regular — no separate Light file is
        # bundled. Without this entry, Flutter falls back to the system font
        # for FontWeight.w300 when GoogleFonts.config.allowRuntimeFetching
        # is false (our GDPR config). Mapping it to Regular is the correct
        # fallback: visually imperceptible, zero crash risk.
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    # Lora bundled font removed — app_typography.dart uses GoogleFonts.lora() (CDN) instead.

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

# Patrol E2E Testing Configuration
patrol:
  app_name: Danio
  android:
    package_name: com.tiarnanlarkin.danio
